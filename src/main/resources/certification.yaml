certification:
  expire-after: 180000 # ms, default: 3minutes
  process-timeout-threshold: 5000 # ms, default: 5seconds

email:
  subject: "대구대학교 학생 인증 메일입니다."
  html:
    |
    <!DOCTYPE html>
    <html>
    <head>
        <meta charset="UTF-8">
        <style>
            body { font-family: Arial, sans-serif; }
            .intro { margin-bottom: 20px; }
            .divider { border: none; border-top: 2px solid #ddd; margin: 20px 0; }
            .code-section { text-align: center; margin: 30px 0; }
            .code { font-size: 36px; font-weight: bold; color: #1976d2; letter-spacing: 2px; }
            .expire { color: #666; margin-top: 10px; }
            .command-section { background-color: #f5f5f5; padding: 15px; border-radius: 5px; margin: 20px 0; }
            .command-desc { margin-bottom: 10px; font-weight: bold; }
            .command { font-family: monospace; background-color: #fff; padding: 10px; border-left: 3px solid #1976d2; }
            .warning { color: #d32f2f; font-weight: bold; margin-top: 20px; }
        </style>
    </head>
    <body>
        <p class="intro">대구대학교 학생 인증 메일을 전송드립니다.</p>
        <hr class="divider">
    
        <div class="code-section">
            <div class="code">{code}</div>
            <div class="expire">인증 코드는 {expire_duration}간 유효합니다.</div>
        </div>
    
        <hr class="divider">
    
        <div class="command-section">
            <div class="command-desc">아래 명령어를 입력하여 인증을 완료합니다</div>
            <div class="command">/인증 코드:{code}</div>
        </div>
    
        <p>인증 코드를 입력하여 인증을 완료해주세요.</p>
    
        <hr class="divider">
    
        <p class="warning">⚠️ 주의: 절대로 인증 코드를 타인에게 공유하지 마세요</p>
    </body>
    </html>